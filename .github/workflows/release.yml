name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  # cleanup old draft before building, so each run starts fresh
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing draft release for this tag
        run: |
          gh release delete "${{ github.ref_name }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

  build-windows:
    needs: cleanup
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agent/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python agent dependencies
        working-directory: agent
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Python agent with PyInstaller
        working-directory: agent
        run: |
          New-Item -ItemType Directory -Path dist -Force
          pyinstaller --onefile --name auralis-agent --distpath dist server.py

      - name: Verify agent executable exists
        run: Test-Path agent/dist/auralis-agent.exe

      - name: Inject version and agent resource
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''

          $cfg = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $cfg.version = $v
          $cfg.bundle.resources = @{ "../agent/dist/auralis-agent.exe" = "agent/auralis-agent.exe" }
          $cfg | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json -Encoding UTF8

          (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$v`"" | Set-Content src-tauri/Cargo.toml -Encoding UTF8

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          draft: true
          generate_release_notes: true
          name: Auralis ${{ github.ref_name }}

  build-linux:
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Inject version
        run: |
          v=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          node scripts/inject-version.js "$v"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          draft: true

  build-macos:
    needs: cleanup
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Inject version
        run: |
          v=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          node scripts/inject-version.js "$v"

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          draft: true
